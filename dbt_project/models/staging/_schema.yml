version: 2

models:
  - name: stg_311_complaints
    description: 1:1 mirror of raw_311.complaints with snake_case + type casts.
    columns:
      - name: unique_key
        tests: [not_null, unique]
      - name: complaint_date
        tests: [not_null]
      - name: complaint_type
        tests: [not_null]

  - name: stg_taxi_trips
    description: Typed view over raw_taxi.records (factory-landed yellow taxi trips).
    columns:
      - name: trip_id
        tests: [not_null, unique]
      - name: pickup_at
        tests: [not_null]

  - name: stg_noise_complaints
    description: 311 service requests filtered to complaint_type='Noise', factory-landed via raw_noise.records.
    columns:
      - name: unique_key
        tests: [not_null, unique]
      - name: complaint_date
        tests: [not_null]
