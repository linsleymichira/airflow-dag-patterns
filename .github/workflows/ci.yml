name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  dag-parse:
    runs-on: ubuntu-latest
    env:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW_HOME: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Airflow + project deps
        run: |
          python -m pip install --upgrade pip
          # Mirror Astro Runtime 3.2-4: Airflow 3.x + standard provider.
          pip install "apache-airflow==3.0.*" "apache-airflow-providers-standard" pytest
          pip install -r requirements.txt

      - name: Run DAG import tests
        run: pytest tests/dags/ -v
